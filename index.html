<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Personal - Planta Chocó CVM</title>
<style>
:root{--azul:#185FA5;--azulbg:#E6F1FB;--verde:#27500A;--verdebg:#EAF3DE;--rojo:#A32D2D;--rojobg:#FCEBEB;--ambar:#854F0B;--ambarbg:#FAEEDA;--gris:#5F5E5A;--grisbg:#F1EFE8;--borde:#D3D1C7;--texto:#2C2C2A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;color:var(--texto);background:#F7F6F2;font-size:14px;line-height:1.5;}
.topbar{background:var(--azul);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.topbar h1{font-size:16px;font-weight:bold;}
.topbar .sub{font-size:11px;opacity:.85;}
.userbox{display:flex;gap:10px;align-items:center;font-size:12px;}
.userbox button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;}
.rolebadge{background:#fff;color:var(--azul);padding:3px 10px;border-radius:10px;font-weight:bold;font-size:11px;}
.wrap{max-width:1200px;margin:0 auto;padding:14px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.kpi{background:var(--grisbg);border-radius:8px;padding:12px;}
.kpi .l{font-size:11px;color:var(--gris);}
.kpi .v{font-size:26px;font-weight:bold;}
.kpi.k-activo .v{color:var(--verde);}
.kpi.k-ingreso .v{color:var(--azul);}
.kpi.k-egreso .v{color:var(--rojo);}
.kpi.k-suspendido .v{color:var(--ambar);}
.kpi.k-contrato .v{color:var(--gris);}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--borde);margin-bottom:14px;flex-wrap:wrap;}
.tabs button{background:none;border:none;padding:9px 14px;font-size:13px;cursor:pointer;color:var(--gris);border-bottom:2px solid transparent;}
.tabs button.active{color:var(--azul);border-bottom-color:var(--azul);font-weight:bold;}
.tabs button:disabled{opacity:.35;cursor:not-allowed;}
.card{background:#fff;border:1px solid var(--borde);border-radius:10px;padding:16px;margin-bottom:12px;}
.card h2{font-size:14px;font-weight:bold;margin-bottom:12px;color:var(--texto);}
.searchbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.searchbar input,.searchbar select{padding:7px 10px;border:1px solid var(--borde);border-radius:6px;font-size:12px;font-family:inherit;}
.searchbar input{flex:1;min-width:200px;}
.btn{padding:7px 14px;border:none;border-radius:6px;font-size:12px;cursor:pointer;}
.btn-prim{background:var(--azul);color:#fff;}
.btn-prim:hover{background:#0C447C;}
.btn-verde{background:var(--verde);color:#fff;}
.btn-rojo{background:var(--rojo);color:#fff;}
.btn-ambar{background:var(--ambar);color:#fff;}
.btn-outline{background:#fff;color:var(--gris);border:1px solid var(--borde);}
.btn-outline:hover{background:var(--grisbg);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--azul);color:#fff;padding:8px 6px;text-align:left;font-weight:bold;position:sticky;top:0;}
td{padding:7px 6px;border-bottom:1px solid #eee;}
tr:hover td{background:#fafafa;}
.tablewrap{max-height:420px;overflow:auto;border:1px solid var(--borde);border-radius:8px;}
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:bold;}
.p-activo{background:var(--verdebg);color:var(--verde);}
.p-egreso{background:var(--rojobg);color:var(--rojo);}
.p-suspendido{background:var(--ambarbg);color:var(--ambar);}
.p-contrato{background:var(--grisbg);color:var(--gris);}
.p-ingreso{background:var(--azulbg);color:var(--azul);}
.form-section{font-size:11px;font-weight:bold;color:var(--azul);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--azulbg);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:11px;color:var(--gris);}
.form-group input,.form-group select,.form-group textarea{padding:7px 9px;border:1px solid var(--borde);border-radius:6px;font-size:13px;font-family:inherit;}
.form-group textarea{resize:vertical;min-height:60px;}
.form-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.hidden{display:none;}
.muted{color:var(--gris);font-size:11px;}
.danger{color:var(--rojo);}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--azulbg);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;color:var(--azul);flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ficha-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--borde);}
.ficha-info h3{font-size:16px;font-weight:bold;}
.ficha-info p{font-size:12px;color:var(--gris);}
.ficha-acciones{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
.ficha-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.ficha-block .block-title{font-size:11px;font-weight:bold;color:var(--azul);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.ficha-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0f0f0;font-size:12px;}
.ficha-row .label{color:var(--gris);}
.ficha-row .value{font-weight:500;text-align:right;max-width:60%;}
.mov-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #eee;font-size:12px;}
.mov-date{color:var(--gris);min-width:85px;font-size:11px;}
.mov-content{flex:1;}
.mov-tipo{margin-bottom:3px;}
.banner{padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:12px;}
.banner-solo-lectura{background:var(--ambarbg);color:var(--ambar);}
.syncing{font-size:11px;color:var(--gris);}
.foto-upload{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.foto-preview{width:80px;height:80px;border-radius:50%;border:2px dashed var(--borde);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gris);overflow:hidden;cursor:pointer;}
.foto-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
#login{position:fixed;inset:0;background:#F7F6F2;display:flex;align-items:center;justify-content:center;z-index:100;}
.loginbox{background:#fff;border:1px solid var(--borde);border-radius:12px;padding:28px;width:340px;max-width:90vw;}
.loginbox h1{font-size:18px;color:var(--azul);margin-bottom:4px;}
.loginbox .sub{font-size:12px;color:var(--gris);margin-bottom:18px;}
.loginbox label{font-size:12px;color:var(--gris);display:block;margin:10px 0 4px;}
.loginbox input{width:100%;padding:8px 10px;border:1px solid var(--borde);border-radius:6px;font-size:13px;}
.loginbox button{width:100%;margin-top:18px;padding:10px;background:var(--azul);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;}
.loginerr{color:var(--rojo);font-size:12px;margin-top:10px;min-height:16px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:12px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:15px;font-weight:bold;margin-bottom:16px;color:var(--texto);}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="loginbox">
    <h1>Control de Personal</h1>
    <div class="sub">Planta Chocó &middot; CVG MINERVEN</div>
    <label>Correo</label>
    <input type="email" id="li-email" placeholder="usuario@cvm.com" autocomplete="username">
    <label>Contraseña</label>
    <input type="password" id="li-pass" placeholder="contraseña" autocomplete="current-password">
    <button onclick="doLogin()">Entrar</button>
    <div class="loginerr" id="li-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
<div class="topbar">
  <div><h1>Control de Personal</h1><div class="sub">Planta Chocó &middot; CVG MINERVEN</div></div>
  <div class="userbox">
    <span id="u-email"></span>
    <span class="rolebadge" id="u-rol"></span>
    <span class="syncing" id="sync-status"></span>
    <button onclick="doLogout()">Salir</button>
  </div>
</div>

<div class="wrap">
  <div id="banner-lectura" class="banner banner-solo-lectura hidden">Modo solo lectura &mdash; RRHH Caracas puede consultar pero no modificar datos.</div>

  <!-- KPIs -->
  <div class="kpis" id="kpis-wrap">
    <div class="kpi k-activo"><div class="l">Personal activo</div><div class="v" id="kpi-activo">0</div></div>
    <div class="kpi k-ingreso"><div class="l">Ingresos este mes</div><div class="v" id="kpi-ingreso">0</div></div>
    <div class="kpi k-egreso"><div class="l">Egresos este mes</div><div class="v" id="kpi-egreso">0</div></div>
    <div class="kpi k-suspendido"><div class="l">Suspendidos</div><div class="v" id="kpi-suspendido">0</div></div>
    <div class="kpi k-contrato"><div class="l">Contratos culminados</div><div class="v" id="kpi-contrato">0</div></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button id="t-directorio" class="active" onclick="tab('directorio')">Directorio</button>
    <button id="t-ingreso" onclick="tab('ingreso')">Nuevo ingreso</button>
    <button id="t-movimientos" onclick="tab('movimientos')">Movimientos</button>
    <button id="t-ficha" class="hidden" onclick="tab('ficha')">Ficha trabajador</button>
  </div>

  <div id="view-directorio"></div>
  <div id="view-ingreso" class="hidden"></div>
  <div id="view-movimientos" class="hidden"></div>
  <div id="view-ficha" class="hidden"></div>
</div>
</div>

<!-- MODAL MOVIMIENTO -->
<div id="modal-mov" class="modal-overlay">
  <div class="modal">
    <h3 id="modal-mov-title">Registrar movimiento</h3>
    <div class="form-group" style="margin-bottom:10px;">
      <label>Tipo de movimiento</label>
      <select id="mov-tipo">
        <option value="Egreso">Egreso</option>
        <option value="Suspension">Suspensión</option>
        <option value="Cambio de cargo">Cambio de cargo</option>
        <option value="Cambio de unidad de adscripcion">Cambio de unidad de adscripción</option>
        <option value="Culminacion de contrato">Culminación de contrato</option>
        <option value="Cambio de grupo rotativo">Cambio de grupo rotativo</option>
        <option value="Transferencia de personal">Transferencia de personal</option>
        <option value="Reincorporacion">Reincorporación</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:10px;">
      <label>Fecha del movimiento</label>
      <input type="date" id="mov-fecha">
    </div>
    <div class="form-group" style="margin-bottom:10px;">
      <label>Detalle / Descripción</label>
      <textarea id="mov-detalle" placeholder="Describe el motivo o detalle del movimiento..."></textarea>
    </div>
    <div class="form-group" style="margin-bottom:10px;" id="mov-nuevo-cargo-wrap">
      <label>Nuevo cargo / unidad / grupo (si aplica)</label>
      <input type="text" id="mov-nuevo-cargo" placeholder="Nuevo valor">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-prim" onclick="guardarMovimiento()">Guardar movimiento</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="firebase-config.js"></script>
<script>
// ── ESTADO GLOBAL ──────────────────────────────────────────
let ROLE = null;
let PERSONAL = {};
let MOV_TRABAJADOR = null;
const today = new Date().toISOString().slice(0,10);
const mesActual = today.slice(0,7);

// ── AUTH ───────────────────────────────────────────────────
function doLogin(){
  const e = document.getElementById('li-email').value.trim();
  const p = document.getElementById('li-pass').value;
  document.getElementById('li-err').textContent = '';
  auth.signInWithEmailAndPassword(e, p).catch(()=>{
    document.getElementById('li-err').textContent = 'Correo o contraseña incorrectos.';
  });
}
function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user => {
  if(user){
    db.ref('usuarios/' + user.uid + '/rol').get().then(snap => {
      ROLE = snap.exists() ? snap.val() : 'CARACAS';
      document.getElementById('u-email').textContent = user.email;
      document.getElementById('u-rol').textContent = ROLE;
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      applyRole();
      cargarPersonal();
    });
  } else {
    ROLE = null;
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
  }
});

function applyRole(){
  const soloLectura = (ROLE === 'CARACAS');
  document.getElementById('banner-lectura').classList.toggle('hidden', !soloLectura);
  document.getElementById('t-ingreso').disabled = soloLectura;
}

// ── CARGA DE DATOS ─────────────────────────────────────────
function cargarPersonal(){
  setSync('cargando...');
  db.ref('personal').on('value', snap => {
    PERSONAL = snap.val() || {};
    setSync('sincronizado');
    actualizarKPIs();
    renderTab();
  });
}

function setSync(t){ document.getElementById('sync-status').textContent = t; }

function actualizarKPIs(){
  const workers = Object.values(PERSONAL);
  const ahora = new Date();
  const mes = ahora.toISOString().slice(0,7);

  let activos=0, ingresos=0, egresos=0, suspendidos=0, contratos=0;
  workers.forEach(w => {
    const est = w.estado || 'Activo';
    if(est === 'Activo') activos++;
    if(est === 'Suspendido') suspendidos++;
    if(est === 'Egresado') egresos++;
    if(est === 'Contrato culminado') contratos++;
    if(w.fechaIngreso && w.fechaIngreso.startsWith(mes)) ingresos++;
    if(w.ultimoMovFecha && w.ultimoMovFecha.startsWith(mes) && (est==='Egresado'||est==='Contrato culminado')) egresos++;
  });

  document.getElementById('kpi-activo').textContent = activos;
  document.getElementById('kpi-ingreso').textContent = ingresos;
  document.getElementById('kpi-egreso').textContent = egresos;
  document.getElementById('kpi-suspendido').textContent = suspendidos;
  document.getElementById('kpi-contrato').textContent = contratos;
}

// ── NAVEGACIÓN ─────────────────────────────────────────────
let TAB = 'directorio';
function tab(t){
  TAB = t;
  ['directorio','ingreso','movimientos','ficha'].forEach(x => {
    document.getElementById('view-'+x).classList.toggle('hidden', x!==t);
    const btn = document.getElementById('t-'+x);
    if(btn) btn.classList.toggle('active', x===t);
  });
  renderTab();
}
function renderTab(){
  if(!ROLE) return;
  if(TAB==='directorio') renderDirectorio();
  if(TAB==='ingreso') renderIngreso();
  if(TAB==='movimientos') renderMovimientos();
  if(TAB==='ficha') renderFicha();
}

// ── 1. DIRECTORIO ──────────────────────────────────────────
let filtroEstado='', filtroCargo='', filtroNomina='', busqueda='';

function renderDirectorio(){
  const v = document.getElementById('view-directorio');
  const workers = Object.values(PERSONAL);
  let lista = workers.filter(w => {
    const b = busqueda.toLowerCase();
    if(b && !w.cedula.includes(b) && !(w.nombres||'').toLowerCase().includes(b) && !(w.apellidos||'').toLowerCase().includes(b)) return false;
    if(filtroEstado && w.estado !== filtroEstado) return false;
    if(filtroCargo && w.cargo !== filtroCargo) return false;
    if(filtroNomina && w.tipoNomina !== filtroNomina) return false;
    return true;
  });

  let html = `<div class="card">
    <div class="searchbar">
      <input type="text" placeholder="Buscar por cédula, nombre o apellido..." value="${busqueda}" oninput="busqueda=this.value;renderDirectorio()">
      <select onchange="filtroEstado=this.value;renderDirectorio()">
        <option value="">Todos los estados</option>
        <option ${filtroEstado==='Activo'?'selected':''}>Activo</option>
        <option ${filtroEstado==='Egresado'?'selected':''}>Egresado</option>
        <option ${filtroEstado==='Suspendido'?'selected':''}>Suspendido</option>
        <option ${filtroEstado==='Contrato culminado'?'selected':''}>Contrato culminado</option>
      </select>
      <select onchange="filtroNomina=this.value;renderDirectorio()">
        <option value="">Todos los tipos</option>
        <option ${filtroNomina==='Operativos'?'selected':''}>Operativos</option>
        <option ${filtroNomina==='Contratados'?'selected':''}>Contratados</option>
        <option ${filtroNomina==='Empleados'?'selected':''}>Empleados</option>
        <option ${filtroNomina==='Direccion y Confianza'?'selected':''}>Dirección y Confianza</option>
      </select>
      <button class="btn btn-prim" onclick="exportarExcel()">Exportar Excel</button>
    </div>
    <div class="muted" style="margin-bottom:8px;">${lista.length} trabajador(es)</div>
    <div class="tablewrap"><table>
      <thead><tr><th>Cédula</th><th>Nombre y apellido</th><th>Cargo</th><th>Gerencia</th><th>Tipo nómina</th><th>F. Ingreso</th><th>Estado</th><th></th></tr></thead>
      <tbody>`;

  lista.slice(0,500).forEach(w => {
    const est = w.estado || 'Activo';
    const pillClass = est==='Activo'?'p-activo':est==='Egresado'?'p-egreso':est==='Suspendido'?'p-suspendido':'p-contrato';
    html += `<tr>
      <td>${w.cedula}</td>
      <td><strong>${w.apellidos||''}, ${w.nombres||''}</strong></td>
      <td>${w.cargo||''}</td>
      <td>${w.gerencia||''}</td>
      <td>${w.tipoNomina||''}</td>
      <td>${formatFecha(w.fechaIngreso)}</td>
      <td><span class="pill ${pillClass}">${est}</span></td>
      <td><button class="btn btn-outline" style="padding:3px 8px;font-size:11px;" onclick="verFicha('${w.cedula}')">Ver ficha</button></td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;
  v.innerHTML = html;
}

// ── 2. NUEVO INGRESO ───────────────────────────────────────
let fotoBase64 = '';

function renderIngreso(){
  const v = document.getElementById('view-ingreso');
  if(ROLE === 'CARACAS'){
    v.innerHTML = '<div class="card"><p class="muted">Solo RRHH Chocó puede registrar ingresos.</p></div>';
    return;
  }
  v.innerHTML = `
  <div class="card">
    <h2>Registro de nuevo ingreso</h2>

    <div class="form-section">Foto del trabajador</div>
    <div class="foto-upload">
      <div class="foto-preview" id="foto-preview-box" onclick="document.getElementById('foto-file').click()">
        <span id="foto-preview-text">Clic para subir foto</span>
        <img id="foto-preview-img" style="display:none;">
      </div>
      <input type="file" id="foto-file" accept="image/*" style="display:none;" onchange="previewFoto(this)">
      <div class="muted">Formatos: JPG, PNG. Máx. 2MB</div>
    </div>

    <div class="form-section">Datos personales</div>
    <div class="form-grid">
      <div class="form-group"><label>Cédula de identidad *</label><input type="text" id="f-cedula" placeholder="Ej: 25777279"></div>
      <div class="form-group"><label>Nombres *</label><input type="text" id="f-nombres"></div>
      <div class="form-group"><label>Apellidos *</label><input type="text" id="f-apellidos"></div>
      <div class="form-group"><label>Sexo</label><select id="f-sexo"><option value="">Seleccionar</option><option>Masculino</option><option>Femenino</option></select></div>
      <div class="form-group"><label>Nacionalidad</label><select id="f-nacionalidad"><option>Venezolano</option><option>Extranjero</option></select></div>
      <div class="form-group"><label>Fecha de nacimiento</label><input type="date" id="f-fnacimiento"></div>
      <div class="form-group"><label>Lugar de nacimiento</label><input type="text" id="f-lugar-nac" placeholder="Ciudad, Estado"></div>
      <div class="form-group"><label>Estado civil</label><select id="f-estado-civil"><option value="">Seleccionar</option><option>Soltero/a</option><option>Casado/a</option><option>Divorciado/a</option><option>Viudo/a</option><option>Unión estable</option></select></div>
      <div class="form-group"><label>Tipo de sangre</label><select id="f-sangre"><option value="">Seleccionar</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
      <div class="form-group"><label>Profesión</label><input type="text" id="f-profesion" placeholder="Profesión u oficio"></div>
    </div>

    <div class="form-section">Contacto y ubicación</div>
    <div class="form-grid">
      <div class="form-group"><label>Estado</label><input type="text" id="f-estado" placeholder="Estado de residencia"></div>

function previewFoto(input){
  if(input.files && input.files[0]){
    const reader = new FileReader();
    reader.onload = e => {
      fotoBase64 = e.target.result;
      document.getElementById('foto-preview-img').src = fotoBase64;
      document.getElementById('foto-preview-img').style.display = 'block';
      document.getElementById('foto-preview-text').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function guardarIngreso(){
  const ced = document.getElementById('f-cedula').value.trim().replace(/[^0-9]/g,'');
  const nom = document.getElementById('f-nombres').value.trim();
  const ape = document.getElementById('f-apellidos').value.trim();
  const cargo = document.getElementById('f-cargo').value.trim();
  const ger = document.getElementById('f-gerencia').value.trim();
  const fing = document.getElementById('f-fingreso').value;
  const msg = document.getElementById('ingreso-msg');

  if(!ced||!nom||!ape||!cargo||!ger||!fing){
    msg.innerHTML = '<span class="danger">Completa los campos obligatorios (*)</span>';
    return;
  }
  if(PERSONAL[ced]){
    msg.innerHTML = '<span class="danger">Ya existe un trabajador con esa cédula.</span>';
    return;
  }

  msg.textContent = 'Guardando...';

  const datos = {
    cedula: ced,
    nombres: nom,
    apellidos: ape,
    sexo: document.getElementById('f-sexo').value,
    nacionalidad: document.getElementById('f-nacionalidad').value,
    fechaNacimiento: document.getElementById('f-fnacimiento').value,
    lugarNacimiento: document.getElementById('f-lugar-nac').value,
    estadoCivil: document.getElementById('f-estado-civil').value,
    tipoSangre: document.getElementById('f-sangre').value,
    profesion: document.getElementById('f-profesion').value,
    estado_geo: document.getElementById('f-estado').value,
    municipio_geo: document.getElementById('f-municipio').value,
    direccion: document.getElementById('f-direccion').value,
    telefono: document.getElementById('f-telefono').value,
    correo: document.getElementById('f-correo').value,
    cuentaBancaria: document.getElementById('f-cuenta').value,
    cvNombre: document.getElementById('f-cv-nombre').value,
    cvEstado: document.getElementById('f-cv-estado').value,
    cvMunicipio: document.getElementById('f-cv-municipio').value,
    cargo: cargo,
    gerencia: ger,
    ubicacion: document.getElementById('f-ubicacion').value,
    fechaIngreso: fing,
    tipoNomina: document.getElementById('f-nomina').value,
    tipoContrato: document.getElementById('f-contrato').value,
    tallaCamisa: document.getElementById('f-camisa').value,
    tallaPantalon: document.getElementById('f-pantalon').value,
    tallaBraga: document.getElementById('f-braga').value,
    tallaZapato: document.getElementById('f-zapato').value,
    zurdo: document.getElementById('f-zurdo').value,
    estado: 'Activo',
    foto: fotoBase64 || '',
    fechaRegistro: today,
    registradoPor: auth.currentUser ? auth.currentUser.email : ''
  };

  const movKey = db.ref('movimientos').push().key;
  const movData = {
    cedula: ced,
    nombre: nom + ' ' + ape,
    tipo: 'Ingreso',
    fecha: fing,
    detalle: 'Ingreso como ' + cargo + ' en ' + ger,
    registradoPor: auth.currentUser ? auth.currentUser.email : '',
    timestamp: Date.now()
  };

  const updates = {};
  updates['personal/' + ced] = datos;
  updates['movimientos/' + movKey] = movData;

  db.ref().update(updates).then(() => {
    msg.innerHTML = '<span style="color:var(--verde)">✓ Trabajador registrado exitosamente.</span>';
    fotoBase64 = '';
    limpiarFormIngreso();
    setTimeout(() => { msg.textContent = ''; }, 3000);
  }).catch(err => {
    msg.innerHTML = '<span class="danger">Error: ' + err.message + '</span>';
  });
}

function limpiarFormIngreso(){
  fotoBase64 = '';
  renderIngreso();
}

// ── 3. MOVIMIENTOS ─────────────────────────────────────────
function renderMovimientos(){
  const v = document.getElementById('view-movimientos');
  db.ref('movimientos').orderByChild('timestamp').limitToLast(200).get().then(snap => {
    const movs = [];
    snap.forEach(ch => movs.unshift({key: ch.key, ...ch.val()}));

    let html = `<div class="card">
      <h2>Historial de movimientos de personal</h2>
      <div class="tablewrap"><table>
        <thead><tr><th>Fecha</th><th>Cédula</th><th>Trabajador</th><th>Tipo</th><th>Detalle</th><th>Registrado por</th></tr></thead>
        <tbody>`;

    if(movs.length === 0){
      html += '<tr><td colspan="6" class="muted" style="text-align:center;padding:20px;">No hay movimientos registrados.</td></tr>';
    }

    movs.forEach(m => {
      const pillC = m.tipo==='Ingreso'?'p-ingreso':m.tipo==='Egreso'?'p-egreso':m.tipo==='Suspension'?'p-suspendido':m.tipo==='Reincorporacion'?'p-activo':'p-contrato';
      html += `<tr>
        <td>${formatFecha(m.fecha)}</td>
        <td>${m.cedula||''}</td>
        <td>${m.nombre||''}</td>
        <td><span class="pill ${pillC}">${m.tipo}</span></td>
        <td>${m.detalle||''}</td>
        <td class="muted">${m.registradoPor||''}</td>
      </tr>`;
    });

    html += `</tbody></table></div></div>`;
    v.innerHTML = html;
  });
}

  const iniciales = ((w.nombres||'').charAt(0) + (w.apellidos||'').charAt(0)).toUpperCase();
  const fotoHtml = w.foto ? `<img src="${w.foto}" alt="foto">` : iniciales;

  if(ROLE === 'CHOCO'){
    accionesBtns = `

      <button class="btn btn-ambar" onclick="abrirModal('${w.cedula}','Suspension')">Suspender</button>
      <button class="btn btn-rojo" onclick="abrirModal('${w.cedula}','Egreso')">Registrar egreso</button>
      <button class="btn btn-outline" onclick="abrirModal('${w.cedula}','')">Otro movimiento</button>`;
    if(est === 'Suspendido' || est === 'Egresado'){
      accionesBtns += `<button class="btn btn-verde" onclick="abrirModal('${w.cedula}','Reincorporacion')">Reincorporar</button>`;
    }
  }

  let html = `<div class="card">
    <div class="ficha-header">
      <div class="avatar">${fotoHtml}</div>
      <div class="ficha-info">
        <h3>${w.apellidos||''}, ${w.nombres||''}</h3>
        <p>C.I: ${w.cedula} &nbsp;·&nbsp; ${w.cargo||''} &nbsp;·&nbsp; <span class="pill ${pillC}">${est}</span></p>
        <p class="muted">${w.gerencia||''} ${w.tipoNomina?'· '+w.tipoNomina:''}</p>
      </div>
      <div class="ficha-acciones">${accionesBtns}</div>
    </div>

    <div class="ficha-grid">
      <div class="ficha-block">
        <div class="block-title">Datos personales</div>
        ${filaFicha('Sexo', w.sexo)}
        ${filaFicha('Nacionalidad', w.nacionalidad)}
        ${filaFicha('F. Nacimiento', formatFecha(w.fechaNacimiento))}
        ${filaFicha('Lugar nacimiento', w.lugarNacimiento)}
        ${filaFicha('Estado civil', w.estadoCivil)}
        ${filaFicha('Tipo de sangre', w.tipoSangre)}
        ${filaFicha('Profesión', w.profesion)}
        ${filaFicha('Estado', w.estado_geo)}
        ${filaFicha('Municipio', w.municipio_geo)}
        ${filaFicha('Dirección', w.direccion)}
        ${filaFicha('Teléfono', w.telefono)}
        ${filaFicha('Correo', w.correo)}
        ${filaFicha('Cuenta bancaria', w.cuentaBancaria)}
      </div>
      <div class="ficha-block">
        <div class="block-title">Datos laborales</div>
        ${filaFicha('Cargo', w.cargo)}
        ${filaFicha('Gerencia', w.gerencia)}
        ${filaFicha('Ubicación física', w.ubicacion)}
        ${filaFicha('F. Ingreso', formatFecha(w.fechaIngreso))}
        ${filaFicha('Tipo nómina', w.tipoNomina)}
        ${filaFicha('Tipo contrato', w.tipoContrato)}
        <div class="block-title" style="margin-top:12px;">Tallas</div>
        ${filaFicha('Camisa', w.tallaCamisa)}
        ${filaFicha('Pantalón', w.tallaPantalon)}
        ${filaFicha('Braga', w.tallaBraga)}
        ${filaFicha('Zapato', w.tallaZapato)}

        ${filaFicha('Centro', w.cvNombre)}
        ${filaFicha('Estado CV', w.cvEstado)}
        ${filaFicha('Municipio CV', w.cvMunicipio)}
      </div>
    </div>

    <div style="margin-top:16px;">
      <div class="block-title">Historial de movimientos</div>

  v.innerHTML = html;

function filaFicha(label, value){
  if(!value) return '';
  return `<div class="ficha-row"><span class="label">${label}</span><span class="value">${value}</span></div>`;
}

function cargarHistorialMovimientos(cedula){
  db.ref('movimientos').orderByChild('cedula').equalTo(cedula).get().then(snap => {
    const el = document.getElementById('historial-movimientos');
    if(!el) return;
    const movs = [];
    snap.forEach(ch => movs.push(ch.val()));
    movs.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));

    if(movs.length === 0){
      el.innerHTML = '<div class="muted">Sin movimientos registrados.</div>';
      return;
    }

    let html = '';
    movs.forEach(m => {
      const pillC = m.tipo==='Ingreso'?'p-ingreso':m.tipo==='Egreso'?'p-egreso':m.tipo==='Suspension'?'p-suspendido':m.tipo==='Reincorporacion'?'p-activo':'p-contrato';
      html += `<div class="mov-item">
        <span class="mov-date">${formatFecha(m.fecha)}</span>
        <div class="mov-content">
          <div class="mov-tipo"><span class="pill ${pillC}">${m.tipo}</span></div>
          <div>${m.detalle||''}</div>
          <div class="muted">${m.registradoPor||''}</div>
        </div>
      </div>`;
    });
    el.innerHTML = html;
  });
}

// ── MODAL MOVIMIENTO ───────────────────────────────────────
function abrirModal(cedula, tipoPreselect){
  MOV_TRABAJADOR = cedula;
  const w = PERSONAL[cedula];
  document.getElementById('modal-mov-title').textContent = 'Movimiento: ' + (w ? w.apellidos+', '+w.nombres : cedula);
  if(tipoPreselect){
    document.getElementById('mov-tipo').value = tipoPreselect;
  }
  document.getElementById('mov-fecha').value = today;
  document.getElementById('mov-detalle').value = '';
  document.getElementById('mov-nuevo-cargo').value = '';
  document.getElementById('modal-mov').style.display = 'flex';
}

function cerrarModal(){
  document.getElementById('modal-mov').style.display = 'none';
  MOV_TRABAJADOR = null;
}

function guardarMovimiento(){
  if(!MOV_TRABAJADOR) return;
  const tipo = document.getElementById('mov-tipo').value;
  const fecha = document.getElementById('mov-fecha').value;
  const detalle = document.getElementById('mov-detalle').value.trim();
  const nuevoCargo = document.getElementById('mov-nuevo-cargo').value.trim();

  if(!fecha){ alert('Selecciona la fecha del movimiento.'); return; }

  const w = PERSONAL[MOV_TRABAJADOR];
  const movKey = db.ref('movimientos').push().key;
  const movData = {
    cedula: MOV_TRABAJADOR,
    nombre: w ? (w.nombres + ' ' + w.apellidos) : MOV_TRABAJADOR,
    tipo: tipo,
    fecha: fecha,
    detalle: detalle + (nuevoCargo ? ' → ' + nuevoCargo : ''),
    registradoPor: auth.currentUser ? auth.currentUser.email : '',
    timestamp: Date.now()
  };

  const updates = {};
  updates['movimientos/' + movKey] = movData;
  updates['personal/' + MOV_TRABAJADOR + '/ultimoMovFecha'] = fecha;

  if(tipo === 'Egreso') updates['personal/' + MOV_TRABAJADOR + '/estado'] = 'Egresado';
  if(tipo === 'Suspension') updates['personal/' + MOV_TRABAJADOR + '/estado'] = 'Suspendido';
  if(tipo === 'Culminacion de contrato') updates['personal/' + MOV_TRABAJADOR + '/estado'] = 'Contrato culminado';
  if(tipo === 'Reincorporacion') updates['personal/' + MOV_TRABAJADOR + '/estado'] = 'Activo';
  if(tipo === 'Cambio de cargo' && nuevoCargo) updates['personal/' + MOV_TRABAJADOR + '/cargo'] = nuevoCargo;
  if(tipo === 'Cambio de unidad de adscripcion' && nuevoCargo) updates['personal/' + MOV_TRABAJADOR + '/gerencia'] = nuevoCargo;

  db.ref().update(updates).then(() => {
    cerrarModal();
    renderFicha();
  }).catch(err => alert('Error: ' + err.message));
}

// ── EXPORTAR EXCEL ─────────────────────────────────────────
function exportarExcel(){
  if(typeof XLSX === 'undefined'){ alert('Librería Excel no disponible.'); return; }
  const workers = Object.values(PERSONAL);
  const rows = [['Cédula','Nombres','Apellidos','Sexo','Nacionalidad','F.Nacimiento','Estado civil','Tipo sangre','Profesión','Estado geo','Municipio','Dirección','Teléfono','Correo','Cuenta bancaria','CV Nombre','CV Estado','CV Municipio','Cargo','Gerencia','Ubicación','F.Ingreso','Tipo nómina','Tipo contrato','Camisa','Pantalón','Braga','Zapato','Zurdo','Estado laboral']];
  workers.forEach(w => {
    rows.push([w.cedula,w.nombres,w.apellidos,w.sexo,w.nacionalidad,w.fechaNacimiento,w.estadoCivil,w.tipoSangre,w.profesion,w.estado_geo,w.municipio_geo,w.direccion,w.telefono,w.correo,w.cuentaBancaria,w.cvNombre,w.cvEstado,w.cvMunicipio,w.cargo,w.gerencia,w.ubicacion,w.fechaIngreso,w.tipoNomina,w.tipoContrato,w.tallaCamisa,w.tallaPantalon,w.tallaBraga,w.tallaZapato,w.zurdo,w.estado||'Activo']);
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, 'Personal');
  XLSX.writeFile(wb, 'Personal_Choco_' + today + '.xlsx');
}

// ── UTILIDADES ─────────────────────────────────────────────
function formatFecha(f){
  if(!f) return '';
  try {
    const [y,m,d] = f.split('-');
    return d+'/'+m+'/'+y;
  } catch(e){ return f; }
}// ── EXPONER FUNCIONES AL WINDOW ──
