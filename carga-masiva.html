var BATCH = 50;

function log(msg){ 
  var el = document.getElementById('log'); 
  el.textContent += msg + '\n'; 
  el.scrollTop = el.scrollHeight; 
}
function status(msg){ document.getElementById('status').textContent = msg; }

document.getElementById('btn-verificar').addEventListener('click', function(){
  log('Verificando Firebase...');
  window.db.ref('personal').once('value').then(function(snap){
    var n = snap.numChildren();
    log('✓ Conexión OK. Trabajadores en Firebase: ' + n);
    status('Firebase tiene ' + n + ' trabajadores actualmente.');
    document.getElementById('btn-cargar').disabled = false;
    if(n > 0) document.getElementById('btn-limpiar').disabled = false;
  }).catch(function(e){ log('✗ Error: ' + e.message); });
});

document.getElementById('btn-cargar').addEventListener('click', function(){
  if(!confirm('¿Confirmas cargar ' + DATOS.length + ' trabajadores en Firebase?')) return;
  this.disabled = true;
  document.getElementById('btn-verificar').disabled = true;
  var prog = document.getElementById('prog');
  prog.style.display = 'block';
  prog.value = 0;
  log('Iniciando carga de ' + DATOS.length + ' registros en lotes de ' + BATCH + '...');
  
  var today = new Date().toISOString().slice(0,10);
  var cargados = 0, errores = 0;

  function cargarLote(inicio){
    var lote = DATOS.slice(inicio, inicio + BATCH);
    if(lote.length === 0){
      log('\n✅ CARGA COMPLETA: ' + cargados + ' trabajadores cargados, ' + errores + ' errores.');
      status('✅ Carga completada: ' + cargados + ' trabajadores.');
      document.getElementById('btn-limpiar').disabled = false;
      return;
    }
    var upd = {};
    lote.forEach(function(w){
      w.fechaRegistro = today;
      w.registradoPor = 'Carga masiva PIM III';
      upd['personal/' + w.cedula] = w;
    });
    window.db.ref().update(upd).then(function(){
      cargados += lote.length;
      prog.value = cargados;
      log('Lote ' + Math.ceil((inicio+BATCH)/BATCH) + ': ' + cargados + '/' + DATOS.length + ' (' + lote[0].cedula + ' → ' + lote[lote.length-1].cedula + ')');
      status('Cargando... ' + cargados + '/' + DATOS.length);
      setTimeout(function(){ cargarLote(inicio + BATCH); }, 300);
    }).catch(function(e){
      errores += lote.length;
      log('✗ Error en lote ' + inicio + ': ' + e.message);
      setTimeout(function(){ cargarLote(inicio + BATCH); }, 500);
    });
  }
  cargarLote(0);
});

document.getElementById('btn-limpiar').addEventListener('click', function(){
  if(!confirm('⚠ ATENCIÓN: Esto eliminará TODOS los trabajadores de Firebase. ¿Seguro?')) return;
  if(!confirm('Segunda confirmación: ¿eliminar todo el personal?')) return;
  log('Eliminando todo el personal...');
  window.db.ref('personal').remove().then(function(){
    log('✓ Personal eliminado.');
    status('Base de datos limpiada.');
  }).catch(function(e){ log('✗ Error: ' + e.message); });
});
</script>
